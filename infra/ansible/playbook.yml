- name: Run Terraform and configure VM
  hosts: 127.0.0.1
  connection: local
  vars_files:
    - vars/main.yml
  vars:
    dockerhub_user: "{{ lookup('env', 'DOCKERHUB_USER') }}"
    dockerhub_pass: "{{ lookup('env', 'DOCKERHUB_PASS') }}"
    telegram_token: "{{ lookup('env', 'TELEGRAM_TOKEN') }}"
    VERSION: "{{ lookup('env', 'VERSION') }}"
  tasks:

    - name: Run Terraform
      community.general.terraform:
        project_path: "../terraform/openstack"
        state: present
        force_init: yes
        variables:
          key_pair: "{{ key_pair }}"
          flavor_name: "{{ flavor_name }}"
          network_name: "{{ network_name }}"
          image_name: "{{ image_name }}"
          volume_size: "{{ volume_size }}"
      register: tf_result

    - name: Add new VM to dynamic inventory
      add_host:
        name: "{{ tf_result.outputs.server_ip.value }}"
        groups: music_servers
        ansible_user: ubuntu

    - name: Wait for SSH to become available
      wait_for_connection:
        delay: 10
        timeout: 300
      delegate_to: "{{ tf_result.outputs.server_ip.value }}"


- name: Install Docker & deploy containers
  hosts: music_servers
  become: yes
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: latest
        update_cache: yes

    - name: Ensure docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create CLI plugins directory
      file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: '0755'

    - name: Download Docker Compose v5
      get_url:
        url: https://github.com/docker/compose/releases/download/v5.0.1/docker-compose-linux-x86_64
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: '0755'

    - name: Login to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_user }}"
        password: "{{ dockerhub_pass }}"

    - name: Create project directory
      file:
        path: /music-app
        state: directory
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: ../../docker-compose.yml
        dest: /music-app/docker-compose.yml

    - name: Run docker compose
      community.docker.docker_compose_v2:
        project_src: /music-app
        pull: always
      environment:
        DOCKERHUB_USER: "{{ dockerhub_user }}"
        VERSION: "{{ VERSION | default('latest') }}"
        TELEGRAM_TOKEN: "{{ telegram_token }}"

